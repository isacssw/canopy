version: 2
project_name: canopy
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/canopy
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
brews:
  - repository:
      owner: isacssw
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/isacssw/canopy"
    description: "Terminal UI for managing parallel AI coding agents"
    license: "MIT"
    dependencies:
      - name: tmux
    test: |
      assert_match version.to_s, shell_output("#{bin}/canopy --version")
changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^chore:']
